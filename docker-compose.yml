services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: jarvis-dev-password-change-me
      POSTGRES_DB: jarvisfitness
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis -d jarvisfitness"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "5110:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=jarvisfitness;Username=jarvis;Password=jarvis-dev-password-change-me
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5183:80"
    depends_on:
      - backend

volumes:
  pgdata:
