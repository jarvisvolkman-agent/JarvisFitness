<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JarvisFitness</title>
<style>
  :root { --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a; --text: #e1e4ed; --muted: #8b8fa3; --accent: #6c8cff; --green: #4caf87; --red: #e05c5c; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; padding: 1rem; max-width: 900px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
  h2 { font-size: 1.1rem; color: var(--accent); margin-bottom: 0.5rem; }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.5rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
  .metric-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .metric-value { font-size: 1.5rem; font-weight: 700; }
  .section { margin-bottom: 1.5rem; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { text-align: left; color: var(--muted); font-weight: 500; padding: 0.4rem 0.6rem; border-bottom: 1px solid var(--border); }
  td { padding: 0.4rem 0.6rem; border-bottom: 1px solid var(--border); }
  .badge { display: inline-block; font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 10px; text-transform: uppercase; font-weight: 600; }
  .badge-active { background: rgba(76,175,135,0.15); color: var(--green); }
  .badge-paused { background: rgba(255,193,7,0.15); color: #ffc107; }
  .badge-completed { background: rgba(108,140,255,0.15); color: var(--accent); }
  .delta-pos { color: var(--red); } .delta-neg { color: var(--green); }
  .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.25rem 1.5rem; font-size: 0.85rem; }
  .profile-grid dt { color: var(--muted); } .profile-grid dd { margin-bottom: 0.35rem; }
  .loading { color: var(--muted); font-style: italic; }
  .error { color: var(--red); }
  #refresh-btn { background: var(--accent); color: #fff; border: none; padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; float: right; }
  #refresh-btn:hover { opacity: 0.85; }
</style>
</head>
<body>
<div style="display:flex;justify-content:space-between;align-items:start">
  <div><h1>JarvisFitness</h1><p class="subtitle">Local-first fitness dashboard</p></div>
  <button id="refresh-btn" onclick="load()">Refresh</button>
</div>

<div id="metrics" class="grid"></div>

<div id="profile-section" class="section card"></div>

<div id="goals-section" class="section">
  <h2>Active Goals</h2>
  <div id="goals-table"></div>
</div>

<div id="checkin-section" class="section">
  <h2>Latest Check-in</h2>
  <div id="checkin-card" class="card"></div>
</div>

<div id="prefs-section" class="section">
  <h2>Preferences &amp; Constraints</h2>
  <div id="prefs-table"></div>
</div>

<script>
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => { if (k === 'className') e.className = v; else e.setAttribute(k, v); });
  children.flat().forEach(c => e.append(typeof c === 'string' ? c : c));
  return e;
}

function fmt(v, suffix) { return v != null ? v + (suffix || '') : '—'; }

async function load() {
  try {
    const res = await fetch('/api/dashboard/summary');
    const d = await res.json();
    renderMetrics(d.metrics);
    renderProfile(d.profile);
    renderGoals(d.activeGoals);
    renderCheckIn(d.recentCheckIn, d.metrics);
    renderPrefs(d.preferences, d.constraints);
  } catch (err) {
    document.getElementById('metrics').innerHTML = '<div class="card error">Failed to load dashboard: ' + err.message + '</div>';
  }
}

function renderMetrics(m) {
  const box = document.getElementById('metrics');
  box.innerHTML = '';
  const items = [
    ['Active Goals', m.activeGoalCount],
    ['Weight', fmt(m.latestWeightKg, ' kg')],
    ['Weight Δ', m.weightDeltaKg != null ? (m.weightDeltaKg > 0 ? '+' : '') + m.weightDeltaKg + ' kg' : '—'],
    ['Energy', fmt(m.latestEnergy, '/10')],
    ['Adherence', fmt(m.latestAdherence, '/10')],
    ['Check-ins', m.totalCheckIns],
  ];
  items.forEach(([label, value]) => {
    const card = el('div', {className: 'card'});
    card.append(el('div', {className: 'metric-label'}, label));
    const val = el('div', {className: 'metric-value'}, String(value));
    if (label === 'Weight Δ' && m.weightDeltaKg != null) val.className += m.weightDeltaKg > 0 ? ' delta-pos' : ' delta-neg';
    card.append(val);
    box.append(card);
  });
}

function renderProfile(p) {
  const box = document.getElementById('profile-section');
  if (!p) { box.innerHTML = '<p class="loading">No profile yet.</p>'; return; }
  box.innerHTML = '<h2>Profile</h2>';
  const dl = el('dl', {className: 'profile-grid'});
  const fields = [['Name', p.fullName],['Age', fmt(p.age)],['Sex', fmt(p.sex)],['Height', fmt(p.heightCm,' cm')],['Weight', fmt(p.weightKg,' kg')],['Activity', p.activityLevel.replace(/_/g,' ')],['Diet', fmt(p.dietStyle)],['Training days/wk', fmt(p.workoutDaysPerWeek)],['Cal target', fmt(p.calorieTarget,' kcal')],['Protein target', fmt(p.proteinTargetG,' g')],['Equipment', fmt(p.equipmentAccess)],['Injuries', fmt(p.injuries)],['Allergies', fmt(p.allergies)]];
  fields.forEach(([k,v]) => { dl.append(el('dt',null,k)); dl.append(el('dd',null,String(v))); });
  box.append(dl);
}

function renderGoals(goals) {
  const box = document.getElementById('goals-table');
  if (!goals.length) { box.innerHTML = '<p class="loading">No active goals.</p>'; return; }
  const t = el('table');
  t.append(el('tr', null, el('th',null,'Goal'), el('th',null,'Target'), el('th',null,'Timeframe'), el('th',null,'Status')));
  goals.forEach(g => {
    const badge = el('span', {className: 'badge badge-' + g.status}, g.status);
    t.append(el('tr', null, el('td',null,g.title), el('td',null, g.targetValue != null ? g.targetValue + ' ' + (g.unit||'') : '—'), el('td',null,g.timeframe||'—'), el('td',null,badge)));
  });
  box.innerHTML = ''; box.append(t);
}

function renderCheckIn(c, m) {
  const box = document.getElementById('checkin-card');
  if (!c) { box.innerHTML = '<p class="loading">No check-ins yet.</p>'; return; }
  box.innerHTML = `<table>
    <tr><th>Date</th><td>${c.checkInDate}</td></tr>
    <tr><th>Weight</th><td>${fmt(c.weightKg,' kg')}</td></tr>
    <tr><th>Calories (avg)</th><td>${fmt(c.caloriesAvg,' kcal')}</td></tr>
    <tr><th>Protein (avg)</th><td>${fmt(c.proteinGAvg,' g')}</td></tr>
    <tr><th>Sessions</th><td>${fmt(c.trainingSessions)}</td></tr>
    <tr><th>Energy</th><td>${fmt(c.energy,'/10')}</td></tr>
    <tr><th>Adherence</th><td>${fmt(c.adherence,'/10')}</td></tr>
    ${c.notes ? '<tr><th>Notes</th><td>'+c.notes+'</td></tr>' : ''}
  </table>`;
}

function renderPrefs(prefs, constraints) {
  const box = document.getElementById('prefs-table');
  const all = [...prefs.map(p=>({...p,_kind:'pref'})), ...constraints.map(c=>({...c,_kind:'constraint'}))];
  if (!all.length) { box.innerHTML = '<p class="loading">No preferences or constraints.</p>'; return; }
  const t = el('table');
  t.append(el('tr',null, el('th',null,'Kind'), el('th',null,'Category'), el('th',null,'Label'), el('th',null,'Value')));
  all.forEach(i => t.append(el('tr',null, el('td',null,i.kind), el('td',null,i.category), el('td',null,i.label), el('td',null,i.value||'—'))));
  box.innerHTML = ''; box.append(t);
}

load();
</script>
</body>
</html>
